name: React.js Actions Script

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Set .env
        run: |
          touch .env
          echo "VITE_API_BASE=${{ vars.VITE_API_BASE_MAIN }}" >> .env

      - name: Build React.js app
        run: |
          npm run build

      - name: Push build dist
        run: |
          git config --global user.name "${{ vars.GH_EMAIL }}"
          git config --global user.email "${{ vars.GH_USERNAME }}"
          git clone --branch main https://${{ secrets.GH_PAT }}@github.com/Theshadowozz/kura-frontend-build.git dist-repository
          rm -rf dist-repository/dist
          cp -R build/dist dist-repository/dist
          cd dist-repository
          git add .
          git commit -m "Build $(date +'%Y%m%d%H%M') of github.com/Theshadowozz/kura-frontend-build/commit/${{ github.sha }}"
          git push
